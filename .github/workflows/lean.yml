name: Lean verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify ResponsibilityOS.lean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Verify ResponsibilityOS kernel
        shell: pwsh
        run: ./check.ps1
